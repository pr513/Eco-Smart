<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect to PMFBY</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }
        p {
            margin-bottom: 30px;
            font-size: 1rem;
            color: #555;
        }
        a {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background-color: #0078d7;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
            margin: 10px;
        }
        a:hover {
            background-color: #005bb5;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Redirect Page</h1>
    <p>Click the button below to visit the PMFBY website or return to the homepage.</p>
    <div class="button-container">
        <a href="https://pmfby.gov.in/" target="_blank" rel="noopener noreferrer">Go to PMFBY Website</a>
        <a href="index.html">Back to Homepage</a>
    </div>
</body>
</html>

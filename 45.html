<script>
function suggestCrops() {
    var nitrogen = parseFloat(document.getElementById("nitrogen").value);
    var phosphorus = parseFloat(document.getElementById("phosphorus").value);
    var potassium = parseFloat(document.getElementById("potassium").value);

    var cropCounts = {}; // Object to store crop counts
    var suitableCrops = [];
    var lowLevels = []; // To store which nutrients are low

    // Nitrogen (N) levels
    if (nitrogen < 90) {
        lowLevels.push("Nitrogen (N)");
    } else if (nitrogen >= 90 && nitrogen <= 150) {
        suitableCrops.push("Rice", "Wheat", "Barley");
    } else if (nitrogen > 150 && nitrogen <= 200) {
        suitableCrops.push("Sugarcane", "Groundnut");
    } else if (nitrogen > 200) {
        suitableCrops.push("Cotton", "Soybean");
    }

    // Phosphorus (P) levels
    if (phosphorus < 2.05) {
        lowLevels.push("Phosphorus (P)");
    } else if (phosphorus >= 2.05 && phosphorus <= 25) {
        suitableCrops.push("Wheat", "Rice", "Sorghum");
    } else if (phosphorus > 25 && phosphorus <= 35) {
        suitableCrops.push("Groundnut", "Sunflower");
    } else if (phosphorus > 35) {
        suitableCrops.push("Cotton", "Maize");
    }

    // Potassium (K) levels
    if (potassium < 150) {
        lowLevels.push("Potassium (K)");
    } else if (potassium >= 150 && potassium <= 300) {
        suitableCrops.push("Tomato", "Potato", "Rice");
    } else if (potassium > 300 && potassium <= 600) {
        suitableCrops.push("Sugarcane", "Banana");
    } else if (potassium > 600) {
        suitableCrops.push("Groundnut", "Soybean");
    }

    // Count the frequency of each crop
    suitableCrops.forEach(function(crop) {
        cropCounts[crop] = (cropCounts[crop] || 0) + 1;
    });

    // Sort crops by frequency (most repeated crops first)
    var sortedCrops = Object.entries(cropCounts).sort(function(a, b) {
        return b[1] - a[1]; // Sort by frequency in descending order
    });

    // Display the most recommended crops
    var cropList = document.getElementById("cropList");
    cropList.innerHTML = "";

    if (sortedCrops.length > 0) {
        var mostRecommendedCrops = sortedCrops.map(function(entry) {
            return entry[0]; // Get the crop name
        });

        mostRecommendedCrops.forEach(function(crop) {
            var li = document.createElement("li");
            li.textContent = crop;
            cropList.appendChild(li);
        });
    } else {
        cropList.innerHTML = "No suitable crops found for the provided levels.";
    }

    // Display the low nutrient levels, if any
    if (lowLevels.length > 0) {
        var lowMessage = document.createElement("p");
        lowMessage.style.color = "red";
        lowMessage.style.marginTop = "20px";
        lowMessage.innerHTML =
            "The following nutrient(s) in your soil are below the recommended range: " +
            lowLevels.join(", ") +
            ". <a href='testimonail.html' target='_blank' style='color:blue;'>Click here</a> to learn how to increase their levels using organic fertilizers.The crop recommendations provided on this website are based on the analysis of soil nutrient levels (N, P, K) and are intended for informational purposes only. While we strive to ensure the accuracy of our recommendations, they may not account for other critical factors such as soil type, pH levels, weather conditions, pest risks, or regional agricultural practices.";
        cropList.appendChild(lowMessage);
           
    }

    document.getElementById("suggestions").style.display = "block";
}
</script>
